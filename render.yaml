services:
  - name: auracore-backend-82bf2
    type: web
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE_NAME
        value: observer
      - key: WEBHOOK_PUBLIC_BASE_URL
        value: https://auracore-backend-82bf2.onrender.com
      - key: WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_USER_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: FRONTEND_ORIGINS
        value: https://auracore-82bf2.web.app
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
