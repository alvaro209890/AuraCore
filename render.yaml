services:
  - name: auracore-backend-82bf2
    type: web
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WHATSAPP_GATEWAY_URL
        value: https://auracore-whatsapp-gateway-82bf2.onrender.com
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_TIMEOUT_SECONDS
        value: "60"
      - key: MEMORY_ANALYSIS_MAX_MESSAGES
        value: "250"
      - key: MEMORY_ANALYSIS_MAX_CHARS
        value: "60000"
      - key: MEMORY_ANALYSIS_MAX_WINDOW_HOURS
        value: "168"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
      - key: FRONTEND_ORIGINS
        value: https://auracore-82bf2.web.app
      - key: DEFAULT_USER_ID
        value: 00000000-0000-0000-0000-000000000001
  - name: auracore-whatsapp-gateway-82bf2
    type: web
    runtime: node
    plan: starter
    rootDir: whatsapp-gateway
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: auracore-whatsapp-auth
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: AURACORE_API_BASE_URL
        value: https://auracore-backend-82bf2.onrender.com
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: INSTANCE_NAME
        value: observer
      - key: WHATSAPP_AUTH_DIR
        value: /var/data/baileys-auth
      - key: QR_EXPIRES_SECONDS
        value: "60"
      - key: RECONNECT_DELAY_MS
        value: "5000"
