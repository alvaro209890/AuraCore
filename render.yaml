services:
  - name: auracore-backend-82bf2
    type: web
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-reasoner
      - key: DEEPSEEK_API_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_TIMEOUT_SECONDS
        value: "60"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_TIMEOUT_SECONDS
        value: "45"
      - key: MEMORY_ANALYSIS_MAX_MESSAGES
        value: "160"
      - key: MEMORY_FIRST_ANALYSIS_MAX_MESSAGES
        value: "120"
      - key: MEMORY_INCREMENTAL_MIN_MESSAGES
        value: "12"
      - key: MEMORY_INCREMENTAL_BATCH_SIZE
        value: "18"
      - key: MEMORY_ANALYSIS_MAX_CHARS
        value: "36000"
      - key: MEMORY_ANALYSIS_MAX_WINDOW_HOURS
        value: "168"
      - key: MEMORY_ANALYSIS_CONTEXT_SNAPSHOTS
        value: "5"
      - key: MEMORY_ANALYSIS_SNAPSHOT_CONTEXT_CHARS
        value: "12000"
      - key: CHAT_MAX_HISTORY_MESSAGES
        value: "18"
      - key: CHAT_CONTEXT_SNAPSHOTS
        value: "5"
      - key: CHAT_CONTEXT_PROJECTS
        value: "8"
      - key: CHAT_CONTEXT_CHARS
        value: "18000"
      - key: CHAT_MAX_MESSAGE_CHARS
        value: "2000"
      - key: MESSAGE_RETENTION_MAX_ROWS
        value: "160"
      - key: WHATSAPP_AGENT_IDLE_TIMEOUT_MINUTES
        value: "10"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
      - key: FRONTEND_ORIGINS
        value: https://auracore-82bf2.web.app,https://auracore-82bf2.firebaseapp.com,http://localhost:3000
      - key: DEFAULT_USER_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: INSTANCE_NAME
        value: observer
      - key: OBSERVER_INSTANCE_NAME
        value: observer
      - key: AGENT_INSTANCE_NAME
        value: agent
      - key: WHATSAPP_GATEWAY_PORT
        value: "10001"
      - key: QR_EXPIRES_SECONDS
        value: "60"
      - key: RECONNECT_DELAY_MS
        value: "5000"
      - key: RENDER_KEEPALIVE_ENABLED
        value: "true"
      - key: RENDER_KEEPALIVE_URL
        value: https://auracore-backend-82bf2.onrender.com/health
      - key: RENDER_KEEPALIVE_INTERVAL_SECONDS
        value: "600"
      - key: NODE_ENV
        value: production
