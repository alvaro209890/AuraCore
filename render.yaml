services:
  - name: auracore-backend-82bf2
    type: web
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_TIMEOUT_SECONDS
        value: "60"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_TIMEOUT_SECONDS
        value: "45"
      - key: MEMORY_ANALYSIS_MAX_MESSAGES
        value: "250"
      - key: MEMORY_ANALYSIS_MAX_CHARS
        value: "60000"
      - key: MEMORY_ANALYSIS_MAX_WINDOW_HOURS
        value: "168"
      - key: MEMORY_ANALYSIS_CONTEXT_SNAPSHOTS
        value: "5"
      - key: MEMORY_ANALYSIS_SNAPSHOT_CONTEXT_CHARS
        value: "12000"
      - key: CHAT_MAX_HISTORY_MESSAGES
        value: "18"
      - key: CHAT_CONTEXT_SNAPSHOTS
        value: "5"
      - key: CHAT_CONTEXT_PROJECTS
        value: "8"
      - key: CHAT_CONTEXT_CHARS
        value: "18000"
      - key: CHAT_MAX_MESSAGE_CHARS
        value: "2000"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
      - key: FRONTEND_ORIGINS
        value: https://auracore-82bf2.web.app
      - key: DEFAULT_USER_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: INSTANCE_NAME
        value: observer
      - key: WHATSAPP_GATEWAY_PORT
        value: "10001"
      - key: QR_EXPIRES_SECONDS
        value: "60"
      - key: RECONNECT_DELAY_MS
        value: "5000"
      - key: NODE_ENV
        value: production
